services:
  - type: web
    name: babel-news-site
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    disk:
      name: babel-news-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DEFAULT_WRITER_USER
        value: EOB
      - key: DEFAULT_WRITER_PASSWORD
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: BABEL_NEWS_DATABASE
        value: /data/site.db
      - key: BABEL_NEWS_UPLOAD_FOLDER
        value: /data/uploads
      - key: BABEL_NEWS_PUBLIC_UPLOAD_PREFIX
        value: uploads
      - key: MAX_CONTENT_LENGTH
        value: "26214400"
